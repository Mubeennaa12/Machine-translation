name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install linting tools
        run: pip install flake8
      - name: Lint with flake8
        run: flake8 app/ evaluation/ --max-line-length=120 --ignore=E501,W503
